<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MalTracer — Email Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0c10;
  --surface:  #111318;
  --card:     #161a22;
  --border:   #1e2330;
  --border2:  #252b3b;
  --fg:       #e8eaf0;
  --muted:    #5a6078;
  --muted2:   #7a8099;
  --primary:  #4f7ef8;
  --primary2: #6b94ff;
  --danger:   #f05252;
  --danger2:  #ff6b6b;
  --warn:     #f59e0b;
  --warn2:    #fbbf24;
  --ok:       #10b981;
  --ok2:      #34d399;
  --info:     #6366f1;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  overflow: hidden;
}

.app { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }

.topbar {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.logo { display: flex; align-items: center; gap: 9px; }
.logo-icon { width: 28px; height: 28px; }
.logo-text { font-size: 15px; font-weight: 800; letter-spacing: .03em; }
.logo-sub { font-size: 11px; color: var(--muted2); font-weight: 500; margin-left: 2px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-text { font-size: 11px; color: var(--ok2); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
.scan-count { font-size: 11px; color: var(--muted2); font-family: 'JetBrains Mono', monospace; }

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header { padding: 16px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-header h2 { font-size: 13px; font-weight: 700; color: var(--fg); }
.sidebar-header p  { font-size: 11px; color: var(--muted2); margin-top: 2px; }

.filter-row { display: flex; gap: 5px; flex-wrap: wrap; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.chip { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--muted2); transition: .15s; }
.chip:hover { border-color: var(--primary); color: var(--primary2); }
.chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.chip.danger.active { background: var(--danger); border-color: var(--danger); }
.chip.warn.active   { background: var(--warn);   border-color: var(--warn); color: #1a1000; }
.chip.ok.active     { background: var(--ok);     border-color: var(--ok);   color: #001a0f; }

.email-list { flex: 1; overflow-y: auto; }
.email-list::-webkit-scrollbar { width: 3px; }
.email-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.email-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .12s; position: relative; }
.email-item:hover { background: var(--card); }
.email-item.active { background: var(--card); }
.email-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 0 2px 2px 0; }
.email-item.active.tone-danger::before { background: var(--danger); }
.email-item.active.tone-warn::before   { background: var(--warn); }
.email-item.active.tone-ok::before     { background: var(--ok); }
.email-item.active.tone-info::before   { background: var(--info); }

.item-icon { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
.icon-danger { background: rgba(240,82,82,.15); color: var(--danger2); }
.icon-warn   { background: rgba(245,158,11,.15); color: var(--warn2); }
.icon-ok     { background: rgba(16,185,129,.15); color: var(--ok2); }
.icon-info   { background: rgba(99,102,241,.15); color: #a5b4fc; }

.item-body { flex: 1; min-width: 0; }
.item-sender  { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-subject { font-size: 11px; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.item-score { flex-shrink: 0; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 5px; }
.score-danger { background: rgba(240,82,82,.15); color: var(--danger2); }
.score-warn   { background: rgba(245,158,11,.15); color: var(--warn2); }
.score-ok     { background: rgba(16,185,129,.12); color: var(--ok2); }
.score-info   { background: rgba(99,102,241,.12); color: #a5b4fc; }

.empty-list { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px 20px; text-align: center; color: var(--muted); }
.empty-list p { font-size: 12px; line-height: 1.7; }

.main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

.welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); }
.welcome svg { opacity: .3; }
.welcome h3 { font-size: 15px; font-weight: 600; color: var(--muted2); }
.welcome p  { font-size: 12px; line-height: 1.7; text-align: center; max-width: 260px; }

.detail { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; }
.detail::-webkit-scrollbar { width: 4px; }
.detail::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.detail-hero { padding: 20px 22px; border-radius: 14px; border: 1px solid var(--border2); background: var(--card); display: flex; align-items: flex-start; gap: 16px; }
.hero-icon { width: 48px; height: 48px; border-radius: 13px; display: grid; place-items: center; font-size: 20px; font-weight: 900; flex-shrink: 0; }
.hero-body { flex: 1; min-width: 0; }
.hero-label { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted2); margin-bottom: 4px; }
.hero-title { font-size: 17px; font-weight: 800; line-height: 1.3; word-break: break-word; }
.hero-from  { font-size: 12px; color: var(--muted2); margin-top: 5px; font-family: 'JetBrains Mono', monospace; }
.hero-badge { flex-shrink: 0; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
.badge-danger { background: rgba(240,82,82,.15); color: var(--danger2); border: 1px solid rgba(240,82,82,.3); }
.badge-warn   { background: rgba(245,158,11,.15); color: var(--warn2);   border: 1px solid rgba(245,158,11,.3); }
.badge-ok     { background: rgba(16,185,129,.12); color: var(--ok2);     border: 1px solid rgba(16,185,129,.25); }
.badge-info   { background: rgba(99,102,241,.12); color: #a5b4fc;         border: 1px solid rgba(99,102,241,.25); }

.score-section { padding: 18px 22px; border-radius: 14px; border: 1px solid var(--border2); background: var(--card); }
.score-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.score-label-row span:first-child { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted2); }
.score-num { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.score-bar { height: 6px; border-radius: 999px; background: var(--border2); overflow: hidden; }
.score-fill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.22,1,.36,1); }

.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-card { padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border2); background: var(--card); }
.info-card .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted2); margin-bottom: 5px; }
.info-card .val { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; word-break: break-all; }
.info-card .val.ok      { color: var(--ok2); }
.info-card .val.fail    { color: var(--danger2); }
.info-card .val.unknown { color: var(--muted2); }

.reasons-card { padding: 16px 18px; border-radius: 12px; border: 1px solid var(--border2); background: var(--card); }
.reasons-card .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted2); margin-bottom: 10px; }
.reason-row { display: flex; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.reason-row:last-child { border-bottom: none; }
.reason-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex-shrink: 0; }
.no-reasons { font-size: 12px; color: var(--ok2); display: flex; align-items: center; gap: 7px; }

.urls-card { padding: 16px 18px; border-radius: 12px; border: 1px solid rgba(240,82,82,.2); background: rgba(240,82,82,.04); }
.urls-card .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--danger2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.url-row { padding: 8px 10px; border-radius: 8px; background: rgba(240,82,82,.07); border: 1px solid rgba(240,82,82,.15); font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--danger2); word-break: break-all; margin-bottom: 6px; }
.url-row:last-child { margin-bottom: 0; }
.no-urls { font-size: 12px; color: var(--ok2); display: flex; align-items: center; gap: 7px; }

.action-bar { padding: 14px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; background: var(--surface); }
.btn-dismiss { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border2); background: transparent; color: var(--fg); font-size: 13px; font-weight: 600; cursor: pointer; transition: .15s; font-family: inherit; }
.btn-dismiss:hover { border-color: var(--primary); color: var(--primary2); }
.btn-report { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--danger); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: filter .15s; font-family: inherit; }
.btn-report:hover { filter: brightness(1.12); }
.btn-report:disabled { background: var(--ok); cursor: default; filter: none; }

.poll-bar { height: 2px; background: var(--border); position: relative; overflow: hidden; flex-shrink: 0; }
.poll-fill { position: absolute; left: -100%; top: 0; height: 100%; width: 100%; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: sweep 3s linear infinite; }
@keyframes sweep { to { left: 100%; } }

.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 18px; border-radius: 10px; background: var(--card); border: 1px solid var(--border2); font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 999; animation: toastin .25s ease; }
.toast.ok    { border-color: var(--ok);    color: var(--ok2); }
.toast.error { border-color: var(--danger); color: var(--danger2); }
@keyframes toastin { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L4 6.5v8C4 20.5 8.5 25.5 14 27c5.5-1.5 10-6.5 10-12.5v-8L14 2z" fill="rgba(79,126,248,.15)" stroke="#4f7ef8" stroke-width="1.5"/>
        <path d="M9 13l3.5 3.5L19 10" stroke="#4f7ef8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">MalTracer</span>
      <span class="logo-sub">/ Email Scanner</span>
    </div>
    <div class="topbar-right">
      <span class="scan-count" id="scan-count">Waiting for scan…</span>
      <div class="status-dot"></div>
      <span class="status-text">Live</span>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Inbox Analysis</h2>
      <p id="inbox-sub">Connecting to scanner…</p>
    </div>
    <div class="filter-row">
      <button class="chip active" onclick="setFilter('all',this)">All</button>
      <button class="chip danger" onclick="setFilter('danger',this)">High Risk</button>
      <button class="chip warn"   onclick="setFilter('warn',this)">Medium</button>
      <button class="chip ok"     onclick="setFilter('ok',this)">Safe</button>
    </div>
    <div class="email-list" id="email-list">
      <div class="empty-list">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        <p>Waiting for email scan results…<br>Run <code style="background:rgba(255,255,255,.07);padding:1px 5px;border-radius:4px;font-size:11px;">python maltracer.py --email-scan</code></p>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="poll-bar"><div class="poll-fill"></div></div>

    <div class="welcome" id="welcome">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      <h3>Select an email to inspect</h3>
      <p>Results from the live Gmail scan appear in the sidebar. Click any email to see the full threat analysis.</p>
    </div>

    <div id="detail-wrap" style="display:none; flex:1; overflow:hidden; flex-direction:column;">
      <div class="detail" id="detail"></div>
      <div class="action-bar">
        <button class="btn-dismiss" onclick="dismissCurrent()">Mark as Safe</button>
        <button class="btn-report" id="btn-report" onclick="reportCurrent()">Report as Threat</button>
      </div>
    </div>
  </main>

</div>

<script>
let emails    = [];
let filter    = 'all';
let selected  = null;
let pollCount = 0;
let dismissed = new Set();
let contained = new Set();

setInterval(() => {
  fetch('http://127.0.0.1:7475/events')
    .then(r => r.json())
    .then(data => {
      if (!data.events) return;
      const newEvs = data.events.slice(pollCount).filter(e => e.type === 'email_threat');
      pollCount = data.events.length;
      newEvs.forEach(ingestEmail);
      if (data.contained) {
        data.contained.forEach(id => contained.add(id));
        renderList();
      }
    })
    .catch(() => {});
}, 2000);

function ingestEmail(ev) {
  const id = ev.incident_id || Math.random().toString(36).slice(2);
  if (emails.find(e => e.id === id)) return;
  const tone = ev.threat_tone || 'info';
  emails.unshift({ id, tone,
    sender:  ev.threat_process || ev.source || 'Unknown',
    subject: ev.threat_title   || 'No Subject',
    score:   ev.threat_score   ?? 0,
    action:  ev.threat_action  || '',
    path:    ev.threat_path    || 'N/A',
    reasons: ev.reasons        || [],
    raw:     ev,
  });
  renderList();
  updateCounts();
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function visible() {
  return emails.filter(e => {
    if (dismissed.has(e.id)) return false;
    if (filter === 'all')    return true;
    if (filter === 'ok')     return e.tone === 'info' || e.tone === 'ok';
    return e.tone === filter;
  });
}

const ICON = { danger:'!', warn:'!', ok:'✓', info:'✉' };
const SCORE_CLS = { danger:'score-danger', warn:'score-warn', ok:'score-ok', info:'score-info' };

function renderList() {
  const list  = document.getElementById('email-list');
  const items = visible();
  if (!items.length) {
    list.innerHTML = `<div class="empty-list">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".4"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      <p>${emails.length ? 'No emails match this filter.' : 'Waiting for scan results…'}</p>
    </div>`;
    return;
  }
  list.innerHTML = items.map(e => {
    const isContained = contained.has(e.raw.gmail_id) || contained.has(e.id);
    const tone = isContained ? 'ok' : e.tone;
    return `<div class="email-item tone-${tone}${selected===e.id?' active':''}" onclick="selectEmail('${e.id}')">
      <div class="item-icon icon-${tone}">${isContained ? '✓' : (ICON[e.tone]||'✉')}</div>
      <div class="item-body">
        <div class="item-sender">${esc(e.sender)}</div>
        <div class="item-subject">${esc(e.subject.replace('Suspicious email: ',''))}</div>
      </div>
      <div class="item-score ${isContained ? 'score-ok' : SCORE_CLS[e.tone]}">${isContained ? '✓' : e.score}</div>
    </div>`;
  }).join('');
}

function selectEmail(id) {
  selected = id;
  renderList();
  const e = emails.find(x => x.id === id);
  if (!e) return;

  document.getElementById('welcome').style.display     = 'none';
  document.getElementById('detail-wrap').style.display = 'flex';

  const isContained = contained.has(e.raw.gmail_id) || contained.has(e.id);
  const fillColor   = e.tone==='danger' ? 'var(--danger)' : e.tone==='warn' ? 'var(--warn)' : 'var(--ok)';
  const spf  = e.raw.spf  || 'Unknown';
  const dkim = e.raw.dkim || 'Unknown';
  function authClass(v) { return v==='Pass'?'ok':v==='Fail'?'fail':'unknown'; }

  const reasonsHTML = e.reasons.length
    ? e.reasons.map(r => `<div class="reason-row"><div class="reason-dot"></div>${esc(r)}</div>`).join('')
    : `<div class="no-reasons"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> No suspicious patterns detected</div>`;

  const urls = (e.path && e.path !== 'N/A') ? e.path.split(', ').filter(Boolean) : [];
  const urlsHTML = urls.length
    ? urls.map(u => `<div class="url-row">⚠ ${esc(u)}</div>`).join('')
    : `<div class="no-urls"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> No suspicious URLs found</div>`;

  const containedBanner = isContained ? `
    <div style="padding:12px 16px;border-radius:12px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--ok2);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Email contained — labeled as MALTRACER-THREAT${e.raw.level==='HIGH' ? ' and moved to Trash' : ''}
    </div>` : '';

  document.getElementById('detail').innerHTML = `
    ${containedBanner}
    <div class="detail-hero">
      <div class="hero-icon icon-${e.tone}">${ICON[e.tone]||'✉'}</div>
      <div class="hero-body">
        <div class="hero-label">Email Threat Analysis</div>
        <div class="hero-title">${esc(e.subject.replace('Suspicious email: ',''))}</div>
        <div class="hero-from">${esc(e.sender)}</div>
      </div>
      <div class="hero-badge ${e.tone==='danger'?'badge-danger':e.tone==='warn'?'badge-warn':'badge-info'}">${e.tone==='danger'?'High Risk':e.tone==='warn'?'Medium Risk':'Safe'}</div>
    </div>
    <div class="score-section">
      <div class="score-label-row">
        <span>Risk Score</span>
        <span class="score-num" style="color:${fillColor}">${e.score} / 100</span>
      </div>
      <div class="score-bar"><div class="score-fill" style="width:${e.score}%;background:${fillColor}"></div></div>
    </div>
    <div class="cards-grid">
      <div class="info-card"><div class="lbl">Classification</div><div class="val" style="color:${fillColor}">${esc(e.action)}</div></div>
      <div class="info-card"><div class="lbl">Incident ID</div><div class="val" style="font-size:11px;color:var(--muted2)">${esc(e.id)}</div></div>
      <div class="info-card"><div class="lbl">SPF</div><div class="val ${authClass(spf)}">${spf}</div></div>
      <div class="info-card"><div class="lbl">DKIM</div><div class="val ${authClass(dkim)}">${dkim}</div></div>
    </div>
    <div class="reasons-card">
      <div class="lbl">⚑ Detection Reasons (${e.reasons.length})</div>
      ${reasonsHTML}
    </div>
    <div class="urls-card">
      <div class="lbl">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Suspicious URLs — DO NOT OPEN
      </div>
      ${urlsHTML}
    </div>
  `;

  const btn = document.getElementById('btn-report');
  if (isContained) {
    btn.textContent = '✓ Contained';
    btn.disabled    = true;
  } else {
    btn.textContent = 'Report as Threat';
    btn.disabled    = false;
  }
}

function dismissCurrent() {
  if (!selected) return;
  dismissed.add(selected);
  selected = null;
  document.getElementById('welcome').style.display     = 'flex';
  document.getElementById('detail-wrap').style.display = 'none';
  renderList();
  updateCounts();
}

function reportCurrent() {
  if (!selected) return;
  const e = emails.find(x => x.id === selected);
  if (!e) return;

  const btn = document.getElementById('btn-report');
  btn.textContent = 'Processing…';
  btn.disabled    = true;

  fetch('http://127.0.0.1:7475/action', {
    method:  'POST',
    headers: {'Content-Type': 'application/json'},
    body:    JSON.stringify({
      action:     'contain',
      message_id: e.raw.gmail_id,
      level:      e.raw.level || 'MEDIUM',
    })
  })
  .then(r => r.json())
  .then(() => {
    contained.add(e.raw.gmail_id);
    contained.add(selected);
    renderList();
    selectEmail(selected);
    showToast('✓ Email contained successfully!', 'ok');
  })
  .catch(() => {
    btn.textContent = 'Report as Threat';
    btn.disabled    = false;
    showToast('Error contacting server.', 'error');
  });
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className   = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function updateCounts() {
  const active = emails.filter(e => !dismissed.has(e.id));
  const high   = active.filter(e => e.tone==='danger').length;
  const med    = active.filter(e => e.tone==='warn').length;
  document.getElementById('scan-count').textContent =
    `${active.length} scanned · ${high} high · ${med} medium`;
  document.getElementById('inbox-sub').textContent =
    `${active.length} emails · ${high+med} flagged`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
